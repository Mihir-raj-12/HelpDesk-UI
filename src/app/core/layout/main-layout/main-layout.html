<mat-sidenav-container class="sidenav-container">
  
  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <div class="logo-container">
      <mat-icon>support_agent</mat-icon>
      <h2>HelpDesk Pro</h2>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      
      <a mat-list-item routerLink="/tickets" routerLinkActive="active-link">
        <mat-icon matListItemIcon>confirmation_number</mat-icon>
        <span matListItemTitle>Tickets</span>
      </a>

      <a mat-list-item routerLink="/admin/users" routerLinkActive="active-link" *ngIf="isAdmin">
        <mat-icon matListItemIcon>manage_accounts</mat-icon>
        <span matListItemTitle>Manage Users</span>
      </a>

      <a mat-list-item routerLink="/admin/categories" routerLinkActive="active-link" *ngIf="isAdmin">
        <mat-icon matListItemIcon>category</mat-icon>
        <span matListItemTitle>Categories</span>
      </a>

    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    
    <mat-toolbar color="primary" class="header">
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="spacer" style="flex: 1 1 auto;"></span>

      <div class="user-profile" style="display: flex; align-items: center;">
        <mat-icon style="margin-right: 8px;">account_circle</mat-icon>
        <span style="margin-right: 16px;">{{ userName }}</span>
        <button mat-icon-button (click)="logout()" title="Logout">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </mat-toolbar>

    <div class="main-wrapper" style="padding: 24px;">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
